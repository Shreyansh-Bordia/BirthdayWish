<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>💖 Birthday Card</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe9f4 0%, #ffe0f0 100%);
            font-family: 'Segoe UI', Roboto;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 16px;
            overflow-x: hidden;
        }

        .birthday-container {

            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);

            border-radius: 60px 60px 40px 40px;

            padding: 32px 24px 48px 24px;

            box-shadow: 0 25px 40px rgba(255, 105, 180, 0.25);

            max-width: 700px;
            width: 100%;

            text-align: center;

            border: 2px solid rgba(255, 255, 255, 0.7);

            transition: all .4s ease;
        }

        /* layout after reveal */

        .birthday-container.revealed-layout {

            padding-top: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }

        .hint {

            font-size: 1.4rem;
            color: #c5476a;

            margin-bottom: 24px;

            letter-spacing: 1px;

            text-shadow: 2px 2px 10px rgba(255, 200, 220, 0.9);
        }

        .hint i {

            color: #ff4d6d;
            font-size: 1.6rem;

            margin: 0 6px;

            animation: tinyPulse 1.5s infinite;
        }

        @keyframes tinyPulse {

            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.15)
            }

            100% {
                transform: scale(1)
            }

        }

        .heart-reveal-btn {

            background: #ff4d6d;

            border: none;

            width: 160px;
            height: 160px;

            border-radius: 50%;

            cursor: pointer;

            box-shadow: 0 10px 0 #b13e55, 0 20px 30px rgba(255, 70, 120, 0.5);

            display: inline-flex;

            align-items: center;
            justify-content: center;

            margin: 8px 0 32px;

            border: 4px solid #fff9;

            transition: all .15s;
        }

        .heart-reveal-btn:hover {

            transform: scale(1.05);
            background: #ff3355;

        }

        .heart-reveal-btn i {

            font-size: 80px;
            color: white;

            filter: drop-shadow(0 5px 5px #8b2e44);
        }

        .card-image {

            width: 100%;
            max-width: 90%;

            height: auto;

            border-radius: 32px;

            box-shadow:
                0 30px 40px -10px rgba(180, 60, 110, 0.6),
                0 0 0 6px #fff,
                0 0 0 12px #ffb6c1;

            margin: 0 auto 10px;

            display: none;

            opacity: 0;
            transform: scale(.9);

            transition: .7s;
        }

        .card-image.revealed {

            display: block;

            opacity: 1;

            transform: scale(1);
        }

        .footer-msg {

            margin-top: 20px;

            font-size: 1.1rem;

            color: #d9567a;

            opacity: .8;
        }

        .mini-hearts-container {

            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            pointer-events: none;

            z-index: 999;
        }

        .mini-heart {

            position: absolute;

            color: #ff3366;

            font-size: 1.8rem;

            opacity: .9;

            animation: floatUp 2.2s ease-out forwards;

            filter: drop-shadow(0 8px 12px rgba(255, 80, 120, 0.5));
        }

        @keyframes floatUp {

            0% {
                transform: translate(0, 0) scale(.3);
                opacity: .8;
            }

            100% {
                transform: translate(var(--dx), var(--dy)) scale(1.2);
                opacity: 0;
            }

        }

        @media(max-width:500px) {

            .birthday-container {
                padding: 20px 16px 32px;
            }

            .card-image {
                max-width: 100%;
            }

            .heart-reveal-btn {
                width: 130px;
                height: 130px;
            }

            .heart-reveal-btn i {
                font-size: 65px;
            }

            .hint {
                font-size: 1.2rem;
            }

        }
    </style>
</head>

<body>

    <div class="mini-hearts-container" id="miniHeartsContainer"></div>

    <div class="birthday-container" id="mainContainer">

        <div class="hint" id="hintText">
            <i class="fas fa-heart"></i>
            tap the big heart
            <i class="fas fa-heart"></i>
        </div>

        <button class="heart-reveal-btn" id="heartButton">
            <i class="fas fa-heart"></i>
        </button>

        <img id="birthdayCard" class="card-image" src="card.png">

        <div class="footer-msg">
            ✨ made with love for you ✨
        </div>

    </div>

    <script>

        const heartBtn = document.getElementById("heartButton")
        const cardImg = document.getElementById("birthdayCard")
        const hintEl = document.getElementById("hintText")
        const container = document.getElementById("mainContainer")
        const miniHeartsContainer = document.getElementById("miniHeartsContainer")

        const audio = new Audio("birthday.mp3")

        let isRevealed = false

        function spawnMiniHearts(count = 80) {

            for (let i = 0; i < count; i++) {

                const heart = document.createElement("i")
                heart.className = "fas fa-heart mini-heart"

                const x = Math.random() * window.innerWidth
                const y = Math.random() * window.innerHeight

                const dx = (Math.random() - 0.5) * 600
                const dy = (Math.random() - 1) * 600

                heart.style.left = x + "px"
                heart.style.top = y + "px"

                heart.style.setProperty("--dx", dx + "px")
                heart.style.setProperty("--dy", dy + "px")

                const size = 1 + Math.random() * 2
                heart.style.fontSize = size + "rem"

                const colors = ["#ff4d6d", "#ff8aa1", "#ffb3c6", "#ff6f91", "#fb6f92", "#ff85a1"]

                heart.style.color = colors[Math.floor(Math.random() * colors.length)]

                miniHeartsContainer.appendChild(heart)

                heart.addEventListener("animationend", () => heart.remove())

            }

        }

        function burstConfetti() {

            confetti({
                particleCount: 120,
                spread: 100,
                origin: { y: 0.6 }
            })

            setTimeout(() => {

                confetti({
                    particleCount: 70,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0.3, y: 0.5 }
                })

                confetti({
                    particleCount: 70,
                    angle: 120,
                    spread: 55,
                    origin: { x: 0.7, y: 0.5 }
                })

            }, 150)

        }

        function revealBirthdayMagic() {

            if (isRevealed) return
            isRevealed = true

            hintEl.style.display = "none"
            heartBtn.style.display = "none"

            /* collapse layout gap */
            container.classList.add("revealed-layout")

            cardImg.style.display = "block"

            setTimeout(() => {
                cardImg.classList.add("revealed")
            }, 50)

            let bursts = 0

            const heartInterval = setInterval(() => {

                spawnMiniHearts(40)

                bursts++

                if (bursts > 6) {
                    clearInterval(heartInterval)
                }

            }, 250)

            burstConfetti()

            audio.play().catch(() => { })

        }

        heartBtn.addEventListener("click", revealBirthdayMagic)

    </script>

</body>

</html>
